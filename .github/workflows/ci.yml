name: CI
# 통합 검증 게이트 — typecheck + 매니페스트 왕복 동일성 + Storybook 빌드.
#
# GitHub Pages 배포는 하지 않는다. 이 저장소는 private이고, GitHub Free 플랜의 Pages는
# public 저장소에만 제공되므로 configure-pages가 "Resource not accessible by integration"으로
# 실패한다. 같은 이유로 jsdelivr @gh(공개 저장소 전용)도 이 저장소를 서빙하지 못한다.
# → Figma 플러그인은 원격 URL 로드 대신 내장 매니페스트를 사용한다.
#
# Pages를 되살리려면: 저장소를 public으로 전환(무료) 또는 조직을 Team 이상 플랜으로 올린 뒤
# Settings → Pages → Source: GitHub Actions 설정. 배포 잡 원문은 git history의
# .github/workflows/pages.yml 참조.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      # src/ds 소스에서 매니페스트를 파생해 플러그인 내장본과 deep-equal 비교.
      # DS props를 바꾸고 플러그인 매니페스트를 안 고치면 여기서 깨진다.
      - run: pnpm build:manifest
      # tokens → tailwind → storybook 빌드 체인 (런타임 빌드 검증)
      - run: pnpm build-storybook
