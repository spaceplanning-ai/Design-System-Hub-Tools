# ==============================================================================
# Deploy — main 머지 시 게이트 재검증 + Admin 앱 빌드 아티팩트
#
# 원칙: **배포/빌드는 게이트 통과의 '결과'이지 별도 경로가 아니다.**
#   - 빌드 job 은 `needs:` 로 검증 job 에 매달려 있다. 게이트를 통과하지 않으면
#     빌드 스텝에 **도달할 수 없다**. "빌드는 급하니 검사 생략"은 존재하지 않는 경로다.
#   - 워크플로우 간에는 `needs:` 를 걸 수 없으므로, 이 워크플로우가 PR 게이트와
#     **동일한 검사 집합**을 선행 job(`gates`, `a11y`)으로 다시 실행한다.
#
# NOTE: Storybook GitHub Pages 배포 job(build-storybook·deploy-storybook)은 제거됨.
#   저장소에 Pages 사이트가 활성화되어 있지 않아 `configure-pages` 가 사이트를 생성하려다
#   기본 GITHUB_TOKEN 권한 부족으로 실패("Resource not accessible by integration")했다.
#   Pages 재도입 시: Settings→Pages→Source='GitHub Actions' 로 사이트를 먼저 활성화한 뒤
#   build-storybook / deploy-storybook job 을 복구할 것. `a11y` job 은 Storybook 을
#   빌드해 axe 검사만 하므로(배포 아님) 그대로 유지한다.
#
# 게이트 override 는 ADR 기록 + 기술부채 티켓이 필수다.
# 이 워크플로우에는 우회 경로(continue-on-error · if 스킵 · || true)가 **0건**이다.
# ==============================================================================
name: Deploy (main)

on:
  push:
    branches: [main]
  workflow_dispatch: # 재배포 — 단, gates 를 다시 통과해야 한다 (우회 아님)

# 최소 권한 (기본 read). 이 워크플로우의 job 은 read 만 필요하다.
permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: false # 배포는 중간에 끊지 않는다

jobs:
  # ── 게이트 재검증 — PR 게이트와 동일 검사 집합 ────────────────────────────
  gates:
    name: 게이트 재검증 (${{ matrix.check }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true # 하나라도 깨지면 배포 경로를 즉시 닫는다
      matrix:
        check:
          - validate:contracts
          - codegen:check # codegen 생성물 최신성
          - contract-test # G5·G6·G7
          - naming:check
          - lint
          - format:check
          - quality:check # 클린코드 6축
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # 패키지 소스가 generated 타입/토큰에 의존하므로 codegen 선행 필수
      - name: 코드젠 (토큰/계약 → generated 산출물)
        run: pnpm codegen
      - run: pnpm ${{ matrix.check }}

  # ── 접근성 감사  — Storybook 빌드가 필요해 별도 job ──────────────────
  a11y:
    name: 접근성 감사 (Storybook test-runner + axe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Playwright 브라우저 설치 (test-runner 실행 환경)
        run: pnpm --filter @tds/a11y exec playwright install --with-deps chromium
      - name: 코드젠 (토큰/계약 → generated 산출물)
        run: pnpm codegen
      - name: Storybook 정적 빌드
        run: pnpm sb:build
      - run: pnpm a11y

  # ── Admin 앱 빌드 아티팩트 ───────────────────────────────────────────────
  build-admin:
    name: Admin 앱 빌드 아티팩트
    needs: [gates, a11y] # 배포물은 게이트 통과의 결과다
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: 코드젠 (토큰/계약 → generated 산출물)
        run: pnpm codegen
      - name: Admin 앱 빌드 (tsc --noEmit && vite build)
        run: pnpm --filter @tds/admin run build
      - name: Admin 빌드 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: admin-dist-${{ github.sha }}
          path: apps/admin/dist/
          if-no-files-found: error # 산출물이 없는데 성공으로 넘기지 않는다
          retention-days: 30
