# ==============================================================================
# Nightly Verification — nightly 검증 파이프라인
#
#  - vrt:  Visual Regression (픽셀 비교, diff > 0.1% 시 실패)
#
#           ⚠️ 지금 이 게이트가 비교하는 대상은 **Figma 가 아니다**.
#           기준 이미지는 두 tier 로 탐색된다 (tools/vrt/src/index.ts):
#             ① docs/figma/specs/**/exports/<storyId>.png — Figma export(정본) → **현재 0건 (비어 있음)**
#             ② reports/vrt/baseline/<storyId>.png  — 자체 관리 baseline → 현재 501건
#           따라서 실제로 켜져 있는 것은 "코드 vs 코드의 과거" = **회귀 감지**이며,
#           "코드 vs Figma" = **디자인 드리프트 감지가 아니다**.
#           tier ① 은 이 저장소에 Figma 파일이 없어 채울 소스가 없다 .
#           tier ① 이 채워지면 그 스토리는 자동으로 Figma export 를 정본으로 쓴다.
#  - drift:  Design Drift 상시 감시 — 발견 시 리포트 기반 드리프트 제안 PR 생성(골격)
#           + 미사용 토큰 리포트 아티팩트 업로드 (Architecture AI 큐 적재용)
#
# ── continue-on-error 감사 (ADR-0009) ──────────────────────────────────────
#   vrt:  continue-on-error 유지 — **유일 허용 용례**. 리포트를 업로드한 뒤
#          `if: steps.vrt.outcome == 'failure'` → `exit 1` 로 실패를 반드시 **전파**한다.
#          전파 스텝 없는 continue-on-error 는 게이트 무력화다.
#   drift: continue-on-error **제거**. 기존 구현은 exit 2(드리프트 발견 = 차단 없음)와
#          도구 실행 실패(그 외 non-zero)를 **구분하지 않고 전부 삼켰다**.
#          이제 종료 코드를 명시적으로 분기한다:
#            exit 0 → 클린 / exit 2 → 드리프트 발견(알림 레벨, 제안 PR 트리거, 차단 없음)
#            그 외  → **도구 실행 실패 → job 실패**. 실패를 '알림'으로 격하시키지 않는다.
# ==============================================================================
name: Nightly Verification

on:
  schedule:
    - cron: '0 18 * * *' # 매일 18:00 UTC = KST 03:00
  workflow_dispatch: # 수동 재실행 허용

permissions:
  contents: read

jobs:
  #픽셀 비교. 현재 기준은 자체 baseline(tier ②) 이다 — Figma export(tier ①)는 0건. 위 주석 참조.
  vrt:
    name: Visual Regression (Storybook ↔ committed baseline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Storybook 정적 빌드 — VRT 의 입력이다. 이 스텝이 없으면 vrt 는
      # 'storybook-static 이 없습니다' 로 exit 2(NOT_VERIFIED) 를 내고 job 이 그대로 실패한다.
      # (실측: 이 스텝을 넣기 전까지 nightly vrt 는 픽셀을 단 한 장도 비교한 적이 없다 —
      #  캡처 대상 자체가 존재하지 않았다.)
      - name: Storybook 정적 빌드 (VRT 입력)
        run: pnpm sb:build
      # Playwright 브라우저 바이너리 — pnpm install 로는 설치되지 않는다.
      # 없으면 captureStories 가 null 을 반환해 역시 exit 2(NOT_VERIFIED) 다.
      - name: Playwright chromium 설치
        run: pnpm --filter @tds/vrt exec playwright install --with-deps chromium
      - name: VRT 실행
        id: vrt
        run: pnpm vrt
        continue-on-error: true # 리포트 업로드 후 실패를 전파한다 (아래 전파 스텝 필수)
      - name: VRT 리포트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vrt-report
          path: reports/vrt/
          if-no-files-found: warn
          retention-days: 14
      - name: VRT 실패 전파 (diff > 0.1% → G7 차단 조건)
        if: steps.vrt.outcome == 'failure'
        run: exit 1

  #토큰/구조 이탈 감시. 차단 없음 — 발견 시 리포트 기반 드리프트 제안 PR (SLO: 수정 리드타임 ≤ 24h)
  drift:
    name: Design Drift 감시 + 리포트 기반 제안 PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # drift 도구는 코드를 직접 수정하지 않는다 — 발견 시 exit 2(알림 레벨)로 종료하고
      # reports/drift/<date>.json·.md 리포트만 기록한다 (tools/drift/src/index.ts 참조)
      #
      # continue-on-error 를 쓰지 않는다. 종료 코드를 직접 분기해
      # "드리프트 발견(차단 없음)"과 "도구 실행 실패(차단)"를 구분한다 —
      # 전자는 명시적으로 '차단 없음'이라 규정한 유일한 검증기이기 때문이고,
      # 후자는 어떤 경우에도 삼켜서는 안 되는 실패이기 때문이다.
      - name: Drift 검사 (발견 시 exit 2 + reports/drift/에 리포트 기록)
        id: drift
        run: |
          set +e
          pnpm drift:check
          code=$?
          set -e
          echo "code=${code}" >> "$GITHUB_OUTPUT"
          if [ "${code}" -eq 0 ]; then
            echo "드리프트 없음 (exit 0)"
          elif [ "${code}" -eq 2 ]; then
            echo "::warning::드리프트 발견 (exit 2) — 차단 없음, 리포트 기반 제안 PR 트리거 (SLO: 수정 리드타임 <= 24h)"
          else
            echo "::error::drift 도구 실행 실패 (exit ${code}) — 드리프트 발견이 아니라 도구 오류다. 실패를 전파한다."
            exit "${code}"
          fi
      - name: 미사용 토큰 · Drift 리포트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-and-unused-token-report
          path: reports/drift/
          if-no-files-found: warn
          retention-days: 14
      # working tree에 남는 변경은 reports/drift/ 리포트뿐이므로, 이 PR은 '자동 수정'이
      # 아니라 리포트를 근거로 후속 수정을 요청하는 '리포트 기반 드리프트 제안 PR'이다
      - name: 리포트 기반 드리프트 제안 PR 생성 (골격)
        if: steps.drift.outputs.code == '2'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: fix/design-drift-auto
          commit-message: 'chore(drift): 리포트 기반 드리프트 제안'
          title: 'chore(drift): 리포트 기반 드리프트 제안 PR (nightly)'
          body: |
            Design Drift nightly 실행에서 드리프트가 발견되어 자동 생성된 리포트 기반 드리프트 제안 PR입니다.

            - drift 도구는 코드를 직접 수정하지 않습니다 — 발견 시 exit 2로 종료하고 `reports/drift/`에 리포트(JSON/MD)만 기록하며, 이 PR에는 해당 리포트가 포함됩니다
            - 실제 수정은 이 리포트를 근거로 담당자가 후속 수행합니다
            - 리포트: 이 워크플로우 실행의 `drift-and-unused-token-report` 아티팩트 참조
            - SLO: Drift 발견 → 수정 리드타임 ≤ 24h (gates.json `slo.driftFixLeadTime`)
            - 이 PR도 pr-gates.yml의 전체 게이트를 통과해야 병합된다
          labels: |
            drift
            automated
          delete-branch: true
