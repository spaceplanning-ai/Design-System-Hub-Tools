name: Deploy TDS docs to GitHub Pages
# TDS 문서 사이트(Storybook) + 디자인시스템 선언(manifest/tokens/docs-content)을
# GitHub Pages로 공개 배포한다. Figma 플러그인이 이 URL을 읽어 디자인시스템을 생성한다.
# (자체 구축 story.to.design — 외부 SaaS 불필요)
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # false: 연속 push 시 중간 배포가 취소되지 않고 순차 배포 → 항상 최신 커밋이 라이브에 반영.
  # (true면 재배포 취소로 라이브가 옛 커밋에 머물러 스토리 청크 해시 불일치 404가 남는다)
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pages를 자동 활성화(Settings 수동 설정 없이도 동작). Source가 'Deploy from a branch'로
      # 잘못 설정돼 있어도 이 단계가 'GitHub Actions' 빌드 타입으로 전환한다.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build:manifest
      - run: pnpm build-storybook
      - name: 사이트 조립 — 랜딩(/) + Storybook(/storybook/) + 선언 파일
        run: |
          mkdir -p _site/storybook
          cp -r storybook-static/* _site/storybook/
          cp site/index.html _site/index.html
          # 선언 파일(Figma 플러그인/도구가 읽는 URL) — 루트와 /storybook/ 양쪽에 둔다(하위호환)
          cp packages/figma-story-tools/manifest.json _site/manifest.json
          cp packages/figma-story-tools/manifest.json _site/storybook/manifest.json
          mkdir -p _site/tokens _site/storybook/tokens
          cp tokens/*.json _site/tokens/
          cp tokens/*.json _site/storybook/tokens/
          cp docs/docs-content.json _site/docs-content.json
          cp docs/docs-content.json _site/storybook/docs-content.json
          touch _site/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with: { path: _site }

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
