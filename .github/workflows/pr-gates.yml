# ==============================================================================
# PR Gates — PR 트리거 게이트 파이프라인
#
# 원칙: CI는 '통과하는 것'이 아니라 '못 통과하게 막는 것'이 목적이다.
#       녹색 체크는 성과가 아니다 — 빨간 X가 제때 떠서 나쁜 코드가 main에 못 들어간 것이 성과다.
#       **아무것도 못 막으면서 초록불을 켜는 게이트는 게이트가 아니라 거짓말이다** (ADR-0009).
#
# ── 브랜치 보호 규칙(required status checks)에 등록할 job id ────────────────
#   contracts  계약 스키마
#   codegen-stale  codegen  생성물 최신성
#   contract-test  4자 일치 (G5·G6·G7)
#   naming  네이밍 규칙
#   lint  ESLint (blockCondition: lint 위반 >= 1건)
#   format-check  Prettier (blockCondition: 포맷 불일치)
#   code-quality  클린코드 6축 (blockCondition: blocker >= 1건)
#   a11y  axe critical/serious (G5·G6)
#   bundle-size  gzip 번들 예산 (G6) — 2026-07-17 복원, 아래 참조
#
#   등록 확인: gh api repos/:owner/:repo/branches/main/protection
#   preview 는 게이트가 아니라 게이트 통과의 *산출물*이므로 required 에 넣지 않는다.
#
# ── bundle-size 복원 기록 (ADR-0009 기술부채 상환) ──────────────────────────
#   ADR-0009 는 이 job 을 **공허 통과**로 지목해 제거하고 승격 조건 2개를 걸어 뒀다.
#   둘 다 충족되어 복원한다:
#     1) `@tds/ui` vite lib mode 빌드 도입 → packages/ui/dist 생성  ✅ packages/ui/vite.config.ts
#     2) `tools/perf` 가 dist 부재 시 skip 이 아니라 **실패**  ✅ exit 1 (status: unmeasurable)
#
#   복원과 함께 **실제로 빨간불이 켜지는지 증명**했다 (통과만 본 가드는 믿지 않는다):
#     · dist 삭제 후 실행  → exit 1 (측정 불가는 통과가 아니다)
#     · 뚱뚱한 모듈 주입 후 빌드  → exit 1 (gzip 241.44KB > 예산 106KB)
#     · 그 모듈을 React.lazy 뒤로 숨김 → exit 1 (전체 합 240.73KB). 같은 상황에서
#       '진입 청크'만 재면 17.32KB 로 **통과**한다 — 그래서 예산 단위는 전체 합이다.
#
#   예산 단위 = `packages/ui/dist/*.js` gzip **합계** (entry + 자체 청크, 서드파티 external).
#   상세 근거는 tools/perf/src/index.ts 헤더 참조.
#
# ── continue-on-error 정책 ─────────────────────────────────────────────────
#   이 워크플로우에는 continue-on-error 가 **한 건도 없다.** 실패는 곧 차단이다.
#   (유일 허용 용례는 nightly.yml 의 vrt: 리포트 업로드 후 exit 1 로 실패를 반드시 전파)
# ==============================================================================
name: PR Gates

on:
  pull_request:

concurrency:
  group: pr-gates-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

# 최소 권한 — 게이트는 읽기만 하면 된다
permissions:
  contents: read

jobs:
  #계약 스키마 검증 (contracts/schemas/component.v1.json)
  contracts:
    name: 계약 검증 (contract.json 스키마)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm validate:contracts

  # codegen 산출물(packages/ui/generated 등)이 계약과 동기화되어 있는지
  codegen-stale:
    name: codegen 산출물 최신성 검사
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm codegen:check

  #Contract ↔ React ↔ Storybook ↔ Figma 4자 일치 (불일치 시 G5/G6/G7 차단)
  contract-test:
    name: 4자 일치 검증 (Contract Test AI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm contract-test

  #네이밍 규칙 (Folder/Component/Variant/Variable/Token/Icon/Story/Page)
  naming:
    name: 네이밍 규칙 검사 (Naming Guard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm naming:check

  # ESLint (차단 조건: lint 위반 1건 이상 또는 포맷 불일치)
  # 규칙을 정하는 것은 , CI에서 돌리는 것은 .
  lint:
    name: 린트 검사 (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # 패키지 소스가 generated 타입/토큰에 의존하므로 codegen 선행 필수
      - name: 코드젠 (토큰/계약 → generated 산출물)
        run: pnpm codegen
      - run: pnpm lint

  #Prettier 포맷 검사
  # 선행 조건: package.json 에 `format:check` 스크립트 필요 .
  # 스크립트가 없으면 이 job 은 RED 다. **그것이 옳다** — 실행할 수 없는 검사는 '통과'가 아니다.
  format-check:
    name: 포맷 검사 (Prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check

  #클린코드 6축 (페이지 간 결합 · 도메인 누수 · 중복 · 복잡도 · 죽은 코드 · 레이어 역방향)
  # blocker >= 1건 → exit 1 → PR 차단. major 는 exit 0 + 리포트 경고.
  # 선행 조건: package.json 에 `quality:check` 스크립트 필요 .
  code-quality:
    name: 클린코드 6축 검사 (Clean Code Inspector)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm quality:check
      # 리포트는 차단의 근거다 — 실패해도(특히 실패했을 때) 반드시 남긴다.
      # 업로드는 실패의 *부가물*이지 대체물이 아니다 (job 실패는 그대로 전파된다).
      - name: 클린코드 리포트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-quality-report
          path: reports/code-quality/
          if-no-files-found: warn
          retention-days: 14

  # Playwright + axe (critical/serious ≥ 1 → G5/G6 차단). storybook-static 이 없으면
  # skip 이 아니라 **실패**한다 (exit 2 NOT_VERIFIED) — 검사 불가는 통과가 아니다.
  a11y:
    name: 접근성 감사 (Playwright + axe)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Playwright 브라우저 설치 (감사 실행 환경)
        run: pnpm --filter @tds/a11y exec playwright install --with-deps chromium
      # .storybook/preview.ts 가 generated/tokens/tokens.css 를 import 하므로 codegen 선행 필수
      - name: 코드젠 (토큰/계약 → generated 산출물)
        run: pnpm codegen
      - name: Storybook 정적 빌드
        run: pnpm sb:build
      - name: 접근성 감사 실행
        id: a11y
        run: pnpm a11y
        continue-on-error: true # 리포트 업로드 후 실패를 전파한다 (아래 전파 스텝 필수)
      # 리포트는 리뷰의 evidence 다 — 실패했을 때야말로 필요하다.
      - name: a11y 리포트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: a11y-report
          path: reports/a11y/
          if-no-files-found: warn
          retention-days: 14
      # exit 1(위반) 과 exit 2(NOT_VERIFIED) 둘 다 여기서 job 을 빨간불로 만든다.
      - name: a11y 실패 전파 (critical/serious ≥ 1 → G5/G6 차단 · NOT_VERIFIED 포함)
        if: steps.a11y.outcome == 'failure'
        run: exit 1

  #gzip 번들 예산 (G6 blockedBy ). ADR-0009 가 건 승격 조건 2개 충족 후 복원.
  # 예산 = base 30KB + 2KB × 컴포넌트 수, 단위는 dist/*.js gzip 합계. 초과 → exit 1 → PR 차단.
  # dist 가 없으면 skip 이 아니라 **실패**한다 — 측정 불가는 통과가 아니다.
  bundle-size:
    name: 번들 예산 검사 (size-limit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # @tds/ui 소스가 generated 토큰/타입에 의존하므로 codegen 선행 필수
      - name: 코드젠 (토큰/계약 → generated 산출물)
        run: pnpm codegen
      - name: UI 라이브러리 빌드 (vite lib mode → packages/ui/dist)
        run: pnpm --filter @tds/ui run build
      - run: pnpm perf
      # 리포트는 차단의 근거다 — 실패했을 때 특히 반드시 남긴다.
      - name: 번들 예산 리포트 업로드
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-report
          path: reports/perf/
          if-no-files-found: warn
          retention-days: 14

  # 프리뷰 — **게이트 전부 통과 후에만** 산출물을 만든다.
  # 깨진 코드의 프리뷰는 리뷰어를 오도한다. 그래서 needs 로 전 게이트에 매단다.
  # 게이트가 아니므로 required check 에 등록하지 않는다 (실패해도 '검증 실패'가 아니라 '산출물 실패').
  preview:
    name: 프리뷰 산출물 (Storybook · Admin — 게이트 통과 후)
    needs:
      - contracts
      - codegen-stale
      - contract-test
      - naming
      - lint
      - format-check
      - code-quality
      - a11y
      - bundle-size
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: 코드젠 (토큰/계약 → generated 산출물)
        run: pnpm codegen
      - name: Storybook 정적 빌드
        run: pnpm sb:build
      - name: Admin 앱 빌드
        run: pnpm --filter @tds/admin run build
      - name: Storybook 프리뷰 업로드
        uses: actions/upload-artifact@v4
        with:
          name: preview-storybook-pr-${{ github.event.pull_request.number }}
          path: packages/ui/storybook-static/
          if-no-files-found: error
          retention-days: 14
      - name: Admin 프리뷰 업로드
        uses: actions/upload-artifact@v4
        with:
          name: preview-admin-pr-${{ github.event.pull_request.number }}
          path: apps/admin/dist/
          if-no-files-found: error
          retention-days: 14
