# ==============================================================================
# Release — 태그 v* 푸시 트리거
#
#  1. CHANGELOG.md에 해당 버전 섹션 존재 검증
#  2. MAJOR 버전(vX.0.0)이면 docs/migration/ 가이드 존재 검증 (D7: vX-to-vY.md)
#  3. 통과 시 GitHub Release 생성 골격 (릴리스 노트 = CHANGELOG 해당 섹션)
# ==============================================================================
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # GitHub Release 생성에 필요

jobs:
  validate:
    name: 릴리스 사전 검증 (CHANGELOG · Migration Guide)
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      major: ${{ steps.meta.outputs.major }}
    steps:
      - uses: actions/checkout@v4
      - name: 태그에서 버전 파싱
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          MAJOR="${VERSION%%.*}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "major=${MAJOR}" >> "$GITHUB_OUTPUT"
          echo "태그: ${TAG} → 버전: ${VERSION} (MAJOR: ${MAJOR})"
      - name: CHANGELOG 버전 섹션 존재 검증
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          if ! grep -q "^## \[${VERSION}\]" CHANGELOG.md; then
            echo "::error file=CHANGELOG.md::'## [${VERSION}]' 섹션이 없습니다. CHANGELOG를 갱신해야 릴리스할 수 있습니다."
            exit 1
          fi
          echo "CHANGELOG OK: ## [${VERSION}] 섹션 존재"
      - name: MAJOR 릴리스 Migration Guide 존재 검증
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          MAJOR="${{ steps.meta.outputs.major }}"
          # MAJOR 릴리스(vX.0.0, X >= 1)는 Migration Guide(D7: docs/migration/vX-to-vY.md) 필수 — G8 체크리스트
          if [[ "${VERSION}" =~ ^[0-9]+\.0\.0$ ]] && [[ "${MAJOR}" -ge 1 ]]; then
            if ls docs/migration/*"-to-v${MAJOR}"*.md >/dev/null 2>&1; then
              echo "Migration Guide OK:"
              ls docs/migration/*"-to-v${MAJOR}"*.md
            else
              echo "::error::MAJOR 릴리스 v${VERSION}인데 docs/migration/*-to-v${MAJOR}*.md 가이드가 없습니다 (D7). 가이드를 작성해야 합니다."
              exit 1
            fi
          else
            echo "MAJOR 릴리스가 아니므로 Migration Guide 검증을 건너뜁니다."
          fi

  release:
    name: GitHub Release 생성 (골격)
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: CHANGELOG에서 해당 버전 릴리스 노트 추출
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          awk -v ver="${VERSION}" '
            $0 ~ ("^## \\[" ver "\\]") { found = 1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          echo "── 릴리스 노트 미리보기 ──"
          cat RELEASE_NOTES.md
      - name: GitHub Release 생성
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ needs.validate.outputs.version }}
          body_path: RELEASE_NOTES.md
