    <meta charset="utf-8" />

    <title>IA · 어드민 플로우</title>
    <style>
      :root {
        --bg: #ffffff;
        --fg: #111827;
        --muted: #6b7280;
        --line: #e5e7eb;
        --chip: #f3f4f6;
        --accent: #2563eb;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b0f19;
          --fg: #e5e7eb;
          --muted: #9ca3af;
          --line: #1f2937;
          --chip: #111827;
          --accent: #60a5fa;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font:
          14px/1.5 -apple-system,
          'Segoe UI',
          'Malgun Gothic',
          sans-serif;
        background: var(--bg);
        color: var(--fg);
      }
      header {
        position: sticky;
        top: 0;
        z-index: 5;
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        padding: 10px 16px;
        border-bottom: 1px solid var(--line);
        background: var(--bg);
      }
      h1 {
        font-size: 15px;
        margin: 0;
        font-weight: 600;
      }
      .sub {
        color: var(--muted);
        font-size: 12px;
        font-family: ui-monospace, Consolas, monospace;
      }
      .spacer {
        flex: 1;
      }
      a,
      button {
        font: inherit;
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      button {
        border: 1px solid var(--line);
        background: var(--chip);
        color: var(--fg);
        border-radius: 6px;
        padding: 4px 10px;
        cursor: pointer;
      }
      button:hover {
        border-color: var(--accent);
      }
      #stage {
        position: relative;
        overflow: hidden;
        height: calc(100vh - 49px);
        cursor: grab;
        background: var(--bg);
      }
      #stage.grabbing {
        cursor: grabbing;
      }
      #pan {
        transform-origin: 0 0;
        position: absolute;
        top: 0;
        left: 0;
      }
      /* 다크에서도 도형 안 글자가 읽히게 — mermaid 가 흰 배경 전제로 그린다 */
      @media (prefers-color-scheme: dark) {
        #stage {
          background: #f8fafc;
        }
      }
      .hint {
        position: fixed;
        right: 14px;
        bottom: 12px;
        color: var(--muted);
        font-size: 11px;
        background: var(--chip);
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 4px 8px;
      }
    </style>
  </head>

    <script>
      (function () {
        var stage = document.getElementById('stage'),
          pan = document.getElementById('pan'),
          svg = pan.querySelector('svg');
        var vb = (svg.getAttribute('viewBox') || '0 0 1000 1000').split(/\s+/).map(Number);
        var W = vb[2],
          H = vb[3],
          scale = 1,
          x = 0,
          y = 0;
        svg.setAttribute('width', W);
        svg.setAttribute('height', H);
        svg.style.width = W + 'px';
        svg.style.height = H + 'px';
        function apply() {
          pan.style.transform = 'translate(' + x + 'px,' + y + 'px) scale(' + scale + ')';
        }
        function fit() {
          var r = stage.getBoundingClientRect();
          scale = Math.min(r.width / W, r.height / H) * 0.96;
          x = (r.width - W * scale) / 2;
          y = (r.height - H * scale) / 2;
          apply();
        }
        document.getElementById('fit').onclick = fit;
        document.getElementById('reset').onclick = function () {
          scale = 1;
          x = 0;
          y = 0;
          apply();
        };
        stage.addEventListener(
          'wheel',
          function (e) {
            e.preventDefault();
            var r = stage.getBoundingClientRect(),
              mx = e.clientX - r.left,
              my = e.clientY - r.top;
            var k = Math.exp(-e.deltaY * 0.0015),
              ns = Math.min(8, Math.max(0.05, scale * k));
            x = mx - (mx - x) * (ns / scale);
            y = my - (my - y) * (ns / scale);
            scale = ns;
            apply();
          },
          { passive: false },
        );
        var dragging = false,
          px = 0,
          py = 0;
        stage.addEventListener('pointerdown', function (e) {
          dragging = true;
          px = e.clientX;
          py = e.clientY;
          stage.classList.add('grabbing');
          stage.setPointerCapture(e.pointerId);
        });
        stage.addEventListener('pointermove', function (e) {
          if (!dragging) return;
          x += e.clientX - px;
          y += e.clientY - py;
          px = e.clientX;
          py = e.clientY;
          apply();
        });
        stage.addEventListener('pointerup', function () {
          dragging = false;
          stage.classList.remove('grabbing');
        });
        window.addEventListener('resize', fit);
        fit();
      })();
    </script>
