<!doctype html>
<meta charset="utf-8" />
<style>
  * { box-sizing: border-box; }
  :root {
    --line: #edeff2;
    --ink: #191f28;
    --ink-2: #4e5968;
    --ink-3: #8b95a1;
    --accent: #3d6bff;
    --bg-soft: #f7f8fa;
  }
  body { font: 12.5px/1.55 -apple-system, system-ui, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 18px 16px; color: var(--ink); background: #fff; }

  header { margin: 0 0 18px; }
  h1 { font-size: 15px; font-weight: 800; margin: 0; letter-spacing: -0.02em; display: flex; align-items: center; gap: 8px; }
  h1 .dot { width: 9px; height: 9px; border-radius: 3px; background: var(--accent); }
  header p { margin: 5px 0 0; font-size: 11.5px; color: var(--ink-3); }

  .sec { margin: 0 0 18px; }
  .sec > .lbl { font-size: 10.5px; font-weight: 700; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.05em; margin: 0 0 9px; }

  /* 프리셋 세그먼트 */
  .seg { display: flex; gap: 4px; background: var(--bg-soft); border-radius: 9px; padding: 3px; }
  .seg label { flex: 1; }
  .seg input { display: none; }
  .seg span { display: block; text-align: center; padding: 7px 4px; border-radius: 7px; font-weight: 600; font-size: 12px; color: var(--ink-2); cursor: pointer; transition: all 0.12s ease; }
  .seg input:checked + span { background: #fff; color: var(--ink); box-shadow: 0 1px 3px rgba(25, 31, 40, 0.1); }

  /* 컬러 */
  .colors { display: flex; flex-direction: column; gap: 7px; }
  .color-row { display: flex; align-items: center; gap: 9px; }
  .color-row > span { flex: 0 0 68px; color: var(--ink-2); }
  .color-row input[type='color'] { width: 30px; height: 28px; padding: 0; border: 1px solid var(--line); border-radius: 7px; flex: none; background: none; cursor: pointer; }
  .color-row input[type='text'] { flex: 1; text-transform: uppercase; font-variant-numeric: tabular-nums; letter-spacing: 0.02em; }
  input[type='text'], input[type='number'], select { width: 100%; padding: 7px 9px; border: 1px solid var(--line); border-radius: 8px; font: inherit; color: var(--ink); background: #fff; }
  input:focus, select:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(61, 107, 255, 0.12); }
  .divider { border: none; border-top: 1px dashed var(--line); margin: 10px 0 7px; }
  .link-btn { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 12px; padding: 6px 0 0; font-weight: 600; }
  .link-btn:hover { text-decoration: underline; }

  .row { display: flex; gap: 9px; margin-bottom: 7px; align-items: center; }
  .row > span { flex: 0 0 68px; color: var(--ink-2); }
  .row small { color: var(--ink-3); flex: none; }
  .help { font-size: 11px; color: var(--ink-3); margin: 5px 0 0; line-height: 1.5; }

  /* 생성 범위 — 토글 칩 */
  .chips { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .chip { display: flex; align-items: center; gap: 7px; padding: 9px 11px; border: 1px solid var(--line); border-radius: 9px; cursor: pointer; font-weight: 500; user-select: none; transition: border-color 0.12s ease, background 0.12s ease; }
  .chip input { accent-color: var(--accent); }
  .chip:has(input:checked) { border-color: var(--accent); background: rgba(61, 107, 255, 0.05); }

  .reset { display: flex; align-items: center; gap: 7px; margin-top: 12px; color: #e03131; cursor: pointer; font-weight: 500; }

  button.primary { display: block; width: 100%; margin: 18px 0 0; padding: 12px; border: none; border-radius: 10px; background: var(--accent); color: #fff; font: inherit; font-weight: 700; font-size: 13px; cursor: pointer; transition: background 0.12s ease; }
  button.primary:hover { background: #2f5ae8; }

  #log { margin-top: 14px; max-height: 150px; overflow-y: auto; font-size: 11px; display: flex; flex-direction: column; gap: 3px; }
  #log div { padding: 4px 8px; border-radius: 6px; background: var(--bg-soft); }
  #log .info { color: #0ca678; }
  #log .warn { color: #b8860b; }
  #log .error { color: #e03131; background: #fff5f5; }
</style>

<header>
  <h1><span class="dot"></span>Figma Dev Tools</h1>
  <p>Figma ↔ Storybook 디자인 시스템을 한 번에 생성합니다.</p>
</header>

<div class="sec">
  <div class="lbl">스타일 프리셋</div>
  <div class="seg">
    <label><input type="radio" name="preset" value="toss" checked /><span>TOSS</span></label>
    <label><input type="radio" name="preset" value="bootstrap" /><span>Bootstrap</span></label>
    <label><input type="radio" name="preset" value="tailwind" /><span>Tailwind</span></label>
  </div>
</div>

<div class="sec">
  <div class="lbl">컬러</div>
  <div class="colors">
    <div class="color-row"><span>메인 컬러</span><input type="color" id="c-primary" /><input type="text" id="h-primary" /></div>
    <div class="color-row"><span>서브 컬러</span><input type="color" id="c-secondary" /><input type="text" id="h-secondary" /></div>
    <div class="color-row"><span>에러</span><input type="color" id="c-error" /><input type="text" id="h-error" /></div>
    <div class="color-row"><span>성공</span><input type="color" id="c-success" /><input type="text" id="h-success" /></div>
    <div class="color-row"><span>배경 색상</span><input type="color" id="c-bg" /><input type="text" id="h-bg" /></div>
    <div class="color-row"><span>폰트 색상</span><input type="color" id="c-text" /><input type="text" id="h-text" /></div>
    <div id="extra-colors" style="display: none">
      <hr class="divider" />
      <div class="color-row"><span>경고</span><input type="color" id="c-warning" /><input type="text" id="h-warning" /></div>
      <div class="color-row"><span>옅은 배경</span><input type="color" id="c-bgSubtle" /><input type="text" id="h-bgSubtle" /></div>
      <div class="color-row"><span>보더</span><input type="color" id="c-border" /><input type="text" id="h-border" /></div>
    </div>
  </div>
  <button class="link-btn" id="btn-add-sub" type="button">+ 서브 컬러 (경고 · 옅은 배경 · 보더)</button>
</div>

<div class="sec">
  <div class="lbl">타이포그래피</div>
  <div class="row">
    <span>폰트</span>
    <select id="t-font">
      <option value="preset">프리셋 기본</option>
      <option value="pretendard">Pretendard</option>
      <option value="nanumsquare">나눔스퀘어</option>
      <option value="twaynalda">Tway 날다체</option>
      <option value="inter">Inter</option>
    </select>
  </div>
  <div class="row"><span>기준 크기</span><input type="number" id="t-base" value="16" /><small>px</small></div>
  <div class="row">
    <span>크기 배수</span>
    <select id="t-scale">
      <option value="1.2">1.2 — 완만</option>
      <option value="1.25" selected>1.25 — 표준</option>
      <option value="1.333">1.333 — 큰 대비</option>
    </select>
  </div>
  <input type="text" id="t-family" style="display: none" />
  <p class="help">선택한 폰트가 Figma에 설치돼 있어야 Text Style에 적용됩니다. 미설치 시 Inter로 폴백됩니다.</p>
</div>

<div class="sec">
  <div class="lbl">생성 범위</div>
  <div class="chips">
    <label class="chip"><input type="checkbox" id="scope-tokens" checked /> 토큰(Variables)</label>
    <label class="chip"><input type="checkbox" id="scope-designSystem" checked /> 컬러·타이포</label>
    <label class="chip"><input type="checkbox" id="scope-icons" checked /> 아이콘</label>
    <label class="chip"><input type="checkbox" id="scope-categories" checked /> 컴포넌트</label>
  </div>
  <label class="reset"><input type="checkbox" id="opt-reset" /> 기존 결과 삭제 후 재생성</label>
</div>

<button class="primary" id="btn-generate">디자인시스템 생성</button>
<div id="log"></div>

<script>
  const PRESETS = {
    bootstrap: {
      colors: { primary: '#7952B3', secondary: '#6C757D', error: '#DC3545', success: '#198754', warning: '#FFC107', bg: '#FFFFFF', bgSubtle: '#F8F9FA', text: '#212529', border: '#DEE2E6' },
      fontFamily: "system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif",
      scale: '1.25',
    },
    tailwind: {
      colors: { primary: '#06B6D4', secondary: '#64748B', error: '#EF4444', success: '#22C55E', warning: '#F59E0B', bg: '#FFFFFF', bgSubtle: '#F9FAFB', text: '#0F172A', border: '#E5E7EB' },
      fontFamily: "'Inter', system-ui, sans-serif",
      scale: '1.25',
    },
    toss: {
      colors: { primary: '#3D6BFF', secondary: '#4E5968', error: '#F04452', success: '#00C471', warning: '#FF9F0A', bg: '#FFFFFF', bgSubtle: '#F5F7FA', text: '#191F28', border: '#E5E8EB' },
      fontFamily: "'Pretendard', -apple-system, sans-serif",
      scale: '1.2',
    },
  }
  const COLOR_KEYS = ['primary', 'secondary', 'error', 'success', 'warning', 'bg', 'bgSubtle', 'text', 'border']
  const FONTS = {
    pretendard: "'Pretendard', -apple-system, sans-serif",
    nanumsquare: "'NanumSquare', sans-serif",
    twaynalda: "'TwayNalda', sans-serif",
    inter: "'Inter', system-ui, sans-serif",
  }
  const HEX_RE = /^#[0-9a-fA-F]{6}$/
  const $ = (id) => document.getElementById(id)

  COLOR_KEYS.forEach((k) => {
    $('c-' + k).addEventListener('input', () => ($('h-' + k).value = $('c-' + k).value.toUpperCase()))
    $('h-' + k).addEventListener('input', () => {
      const v = $('h-' + k).value.trim()
      if (HEX_RE.test(v)) $('c-' + k).value = v
    })
  })

  function applyPreset(name) {
    const p = PRESETS[name]
    COLOR_KEYS.forEach((k) => {
      $('c-' + k).value = p.colors[k]
      $('h-' + k).value = p.colors[k].toUpperCase()
    })
    $('t-family').value = p.fontFamily
    $('t-scale').value = p.scale
    $('t-font').value = 'preset'
  }
  document.querySelectorAll('input[name=preset]').forEach((r) => r.addEventListener('change', () => applyPreset(r.value)))
  $('t-font').addEventListener('change', () => {
    const v = $('t-font').value
    if (v === 'preset') {
      const preset = document.querySelector('input[name=preset]:checked').value
      $('t-family').value = PRESETS[preset].fontFamily
    } else {
      $('t-family').value = FONTS[v]
    }
  })
  $('btn-add-sub').onclick = () => {
    $('extra-colors').style.display = 'block'
    $('btn-add-sub').style.display = 'none'
  }
  applyPreset('toss')

  $('btn-generate').onclick = () => {
    const preset = document.querySelector('input[name=preset]:checked').value
    const colors = {}
    COLOR_KEYS.forEach((k) => (colors[k] = $('c-' + k).value.toUpperCase()))
    parent.postMessage(
      {
        pluginMessage: {
          type: 'generate',
          preset,
          colors,
          typography: { fontFamily: $('t-family').value, baseSize: Number($('t-base').value), scale: Number($('t-scale').value) },
          social: [],
          charts: false,
          reset: $('opt-reset').checked,
          scope: {
            tokens: $('scope-tokens').checked,
            designSystem: $('scope-designSystem').checked,
            icons: $('scope-icons').checked,
            categories: $('scope-categories').checked,
            components: false,
            snapshots: false,
          },
        },
      },
      '*',
    )
  }

  const log = $('log')
  onmessage = (e) => {
    const msg = e.data.pluginMessage
    if (!msg || msg.type !== 'status') return
    const div = document.createElement('div')
    div.className = msg.level
    div.textContent = msg.message
    log.prepend(div)
  }
</script>
