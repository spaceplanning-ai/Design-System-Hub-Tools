<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          Inter,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          sans-serif;
      }
      body {
        margin: 0;
        padding: 16px;
        font-size: 12px;
        color: #1e1e1e;
        background: #ffffff;
      }
      @media (prefers-color-scheme: dark) {
        body {
          color: #e6e6e6;
          background: #2c2c2c;
        }
      }
      h1 {
        margin: 0 0 4px;
        font-size: 13px;
        font-weight: 600;
      }
      p.sub {
        margin: 0 0 14px;
        opacity: 0.6;
      }
      button {
        appearance: none;
        border: 0;
        border-radius: 6px;
        padding: 8px 12px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        background: #0d99ff;
        color: #fff;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .row {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      .bar {
        height: 6px;
        border-radius: 3px;
        background: rgba(128, 128, 128, 0.25);
        overflow: hidden;
        margin: 14px 0 6px;
      }
      .bar > i {
        display: block;
        height: 100%;
        width: 0%;
        background: #0d99ff;
        transition: width 0.15s ease;
      }
      #log {
        margin-top: 10px;
        max-height: 180px;
        overflow: auto;
        font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
        font-size: 11px;
        line-height: 1.5;
        white-space: pre-wrap;
        opacity: 0.85;
      }
      .warn {
        color: #c94f00;
      }
      .err {
        color: #e5484d;
      }
    </style>
  </head>
  <body>
    <h1>TDS — Design System Reproducer</h1>
    <p class="sub">Rebuilds the TDS design system in this file from the generated contract.</p>
    <div class="row">
      <button id="run">Generate design system</button>
      <button id="close" style="background: transparent; color: inherit">Close</button>
    </div>
    <div class="bar"><i id="fill"></i></div>
    <div id="status">Idle.</div>
    <div id="log"></div>

    <script>
      const $ = (id) => document.getElementById(id);
      $('run').onclick = () => {
        $('run').disabled = true;
        $('log').textContent = '';
        parent.postMessage({ pluginMessage: { type: 'run' } }, '*');
      };
      $('close').onclick = () => parent.postMessage({ pluginMessage: { type: 'close' } }, '*');

      onmessage = (e) => {
        const msg = e.data.pluginMessage;
        if (!msg) return;
        if (msg.type === 'progress') {
          $('fill').style.width = Math.round(msg.pct * 100) + '%';
          $('status').textContent = msg.label;
        } else if (msg.type === 'log') {
          const line = document.createElement('div');
          if (msg.level) line.className = msg.level;
          line.textContent = msg.text;
          $('log').appendChild(line);
          $('log').scrollTop = $('log').scrollHeight;
        } else if (msg.type === 'done') {
          $('fill').style.width = '100%';
          $('status').textContent = msg.label || 'Done.';
          $('run').disabled = false;
        }
      };
    </script>
  </body>
</html>
