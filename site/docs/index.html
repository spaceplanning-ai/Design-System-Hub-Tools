<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="description" content="Figma Dev Tools 컴포넌트 문서 — Figma와 Storybook에 구축된 디자인 시스템 컴포넌트를 한 곳에서 미리보기." />
<title>컴포넌트 문서 — Figma Dev Tools</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<style>
  :root {
    --bg: #ffffff; --surface: #f7f8fa; --surface-2: #f1f3f6; --line: #ebedf0;
    --ink: #191f28; --ink-2: #4e5968; --ink-3: #8b95a1;
    --accent: #3d6bff; --accent-soft: rgba(61, 107, 255, 0.09);
    --figma: #9a5cff; --storybook: #ff4785; --ok: #00b26b;
    --shadow: 0 1px 2px rgba(25, 31, 40, 0.04), 0 8px 24px rgba(25, 31, 40, 0.05);
    --sidebar-w: 288px; --header-h: 60px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #131519; --surface: #1c1f25; --surface-2: #23272e; --line: #2b3038;
      --ink: #f2f4f6; --ink-2: #aeb6bf; --ink-3: #79818b;
      --accent: #5f86ff; --accent-soft: rgba(95, 134, 255, 0.14);
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 10px 30px rgba(0, 0, 0, 0.35);
    }
  }
  :root[data-theme='dark'] {
    --bg: #131519; --surface: #1c1f25; --surface-2: #23272e; --line: #2b3038;
    --ink: #f2f4f6; --ink-2: #aeb6bf; --ink-3: #79818b;
    --accent: #5f86ff; --accent-soft: rgba(95, 134, 255, 0.14);
    --shadow: 0 1px 2px rgba(0, 0, 0, 0.3), 0 10px 30px rgba(0, 0, 0, 0.35);
  }
  :root[data-theme='light'] {
    --bg: #ffffff; --surface: #f7f8fa; --surface-2: #f1f3f6; --line: #ebedf0;
    --ink: #191f28; --ink-2: #4e5968; --ink-3: #8b95a1;
    --accent: #3d6bff; --accent-soft: rgba(61, 107, 255, 0.09);
    --shadow: 0 1px 2px rgba(25, 31, 40, 0.04), 0 8px 24px rgba(25, 31, 40, 0.05);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: 'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', system-ui, sans-serif;
    line-height: 1.6; letter-spacing: -0.011em; -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }

  /* ── header ── */
  header {
    position: sticky; top: 0; z-index: 30; height: var(--header-h);
    display: flex; align-items: center; gap: 16px; padding: 0 20px;
    background: color-mix(in srgb, var(--bg) 84%, transparent);
    backdrop-filter: saturate(180%) blur(14px); border-bottom: 1px solid var(--line);
  }
  .brand { display: flex; align-items: center; gap: 9px; font-weight: 800; font-size: 15.5px; letter-spacing: -0.02em; }
  .brand .m { width: 22px; height: 22px; border-radius: 7px; background: linear-gradient(135deg, var(--figma), var(--accent) 55%, var(--storybook)); }
  .brand .sub { color: var(--ink-3); font-weight: 600; font-size: 13px; padding-left: 8px; margin-left: 2px; border-left: 1px solid var(--line); }
  .h-links { display: flex; gap: 4px; margin-left: auto; align-items: center; }
  .h-links a, .icon-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 12px; border-radius: 10px; font-size: 13.5px; font-weight: 600; color: var(--ink-2); border: 1px solid transparent; background: transparent; }
  .h-links a:hover, .icon-btn:hover { color: var(--ink); background: var(--surface); }
  .icon-btn { padding: 8px; }
  .h-links .dot { width: 7px; height: 7px; border-radius: 50%; }
  .dot.sb { background: var(--storybook); }
  .menu-btn { display: none; }

  /* ── shell ── */
  .shell { display: grid; grid-template-columns: var(--sidebar-w) 1fr; align-items: start; }

  /* ── sidebar ── */
  aside {
    position: sticky; top: var(--header-h); align-self: start;
    height: calc(100vh - var(--header-h)); overflow-y: auto;
    border-right: 1px solid var(--line); padding: 16px 12px 60px;
    background: var(--bg);
  }
  .search { position: relative; margin-bottom: 12px; }
  .search input {
    width: 100%; padding: 9px 12px 9px 34px; border-radius: 11px; border: 1px solid var(--line);
    background: var(--surface); color: var(--ink); font-size: 13.5px; outline: none;
  }
  .search input:focus { border-color: var(--accent); background: var(--bg); }
  .search svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--ink-3); }

  #tree details { margin: 0; }
  #tree summary {
    list-style: none; cursor: pointer; display: flex; align-items: center; gap: 6px;
    padding: 7px 8px; border-radius: 9px; user-select: none;
    font-weight: 700; letter-spacing: -0.01em; color: var(--ink);
  }
  #tree summary::-webkit-details-marker { display: none; }
  #tree summary::before {
    content: ''; width: 0; height: 0; border-left: 5px solid currentColor;
    border-top: 4px solid transparent; border-bottom: 4px solid transparent;
    transform: rotate(0deg); transition: transform 0.15s ease; color: var(--ink-3); flex: none;
  }
  #tree details[open] > summary::before { transform: rotate(90deg); }
  #tree summary:hover { background: var(--surface); }
  #tree .sec > summary { font-size: 13px; text-transform: none; margin-top: 6px; }
  #tree .grp > summary { font-size: 13.5px; color: var(--ink-2); font-weight: 600; }
  #tree .grp-body { padding-left: 12px; border-left: 1px solid var(--line); margin-left: 12px; }
  #tree .sec > .grp-body { padding-left: 8px; border-left: none; margin-left: 6px; }

  .leaf {
    display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 9px;
    font-size: 13.5px; color: var(--ink-2); font-weight: 500;
  }
  .leaf:hover { background: var(--surface); color: var(--ink); }
  .leaf.active { background: var(--accent-soft); color: var(--accent); font-weight: 700; }
  .leaf .cnt {
    margin-left: auto; font-size: 11px; font-weight: 700; color: var(--ink-3);
    background: var(--surface-2); border-radius: 999px; padding: 1px 7px; font-variant-numeric: tabular-nums;
  }
  .leaf.active .cnt { background: color-mix(in srgb, var(--accent) 16%, transparent); color: var(--accent); }
  .leaf .cnt.guide { background: var(--accent-soft); color: var(--accent); font-size: 10.5px; letter-spacing: 0.01em; }

  /* ── content ── */
  main { min-width: 0; }
  .content { max-width: 980px; margin: 0 auto; padding: 34px 32px 80px; }

  .crumb { font-size: 13px; color: var(--ink-3); font-weight: 600; }
  .crumb b { color: var(--ink-2); }
  .c-head { display: flex; align-items: flex-end; gap: 16px; flex-wrap: wrap; margin: 8px 0 4px; }
  .c-head h1 { font-size: clamp(26px, 4vw, 34px); font-weight: 800; letter-spacing: -0.03em; margin: 0; }
  .c-head .spacer { flex: 1; }
  .c-actions { display: flex; gap: 8px; }
  .pill {
    display: inline-flex; align-items: center; gap: 7px; padding: 8px 14px; border-radius: 10px;
    font-size: 13px; font-weight: 700; border: 1px solid var(--line); background: var(--surface); color: var(--ink);
  }
  .pill:hover { background: var(--surface-2); }
  .pill.primary { background: var(--accent); color: #fff; border-color: transparent; }
  .meta-row { display: flex; gap: 8px; align-items: center; margin: 14px 0 26px; flex-wrap: wrap; }
  .chip { display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px; font-weight: 600; color: var(--ink-2); background: var(--surface); border: 1px solid var(--line); border-radius: 999px; padding: 5px 12px; }
  .chip b { color: var(--accent); }

  .story { border: 1px solid var(--line); border-radius: 16px; overflow: hidden; background: var(--surface); margin-bottom: 22px; box-shadow: var(--shadow); }
  .story-bar { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--line); background: color-mix(in srgb, var(--surface) 60%, var(--bg)); }
  .story-bar .name { font-weight: 700; font-size: 14px; letter-spacing: -0.01em; }
  .story-bar .open { margin-left: auto; font-size: 12.5px; font-weight: 600; color: var(--ink-3); display: inline-flex; align-items: center; gap: 5px; }
  .story-bar .open:hover { color: var(--accent); }
  .frame-wrap { background: var(--bg); }
  .frame-wrap iframe { width: 100%; border: 0; display: block; min-height: 120px; }

  /* ── tabs (미리보기 / 사용법·변수조합) ── */
  .tabs { display: flex; gap: 2px; border-bottom: 1px solid var(--line); margin: 18px 0 22px; }
  .tab { padding: 10px 16px; font-size: 14px; font-weight: 700; letter-spacing: -0.01em; color: var(--ink-3); border: 0; background: none; border-bottom: 2px solid transparent; margin-bottom: -1px; cursor: pointer; display: inline-flex; align-items: center; gap: 7px; }
  .tab:hover { color: var(--ink-2); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab .tdot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); opacity: 0; }
  .tab.active .tdot { opacity: 1; }
  .pane[hidden] { display: none; }

  .guide-note { display: flex; gap: 10px; align-items: flex-start; font-size: 13.5px; color: var(--ink-2); background: var(--accent-soft); border-radius: 12px; padding: 12px 16px; margin-bottom: 18px; line-height: 1.5; }
  .guide-note svg { flex: none; margin-top: 2px; }
  .guide-note b { color: var(--accent); font-weight: 700; }

  /* Storybook 문서(autodocs·MDX)는 라이트 배경 문서라 항상 흰 종이 카드로 감싼다(다크에서도 가독). */
  .doc-card { border: 1px solid var(--line); border-radius: 16px; overflow: hidden; background: #ffffff; box-shadow: var(--shadow); }
  .doc-card iframe { width: 100%; border: 0; display: block; min-height: 420px; background: #ffffff; }
  .doc-loading { padding: 40px; text-align: center; color: var(--ink-3); font-size: 14px; }

  /* ── overview ── */
  .ov { padding: 8px 0; }
  .ov .eyebrow { display: inline-flex; align-items: center; gap: 8px; font-size: 12.5px; font-weight: 700; letter-spacing: 0.02em; color: var(--accent); background: var(--accent-soft); padding: 6px 13px; border-radius: 999px; }
  .ov h1 { font-size: clamp(28px, 5vw, 42px); font-weight: 800; letter-spacing: -0.035em; margin: 20px 0 0; text-wrap: balance; }
  .ov p.lead { font-size: 17px; color: var(--ink-2); margin: 14px 0 0; max-width: 560px; text-wrap: balance; }
  .ov-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin: 30px 0; max-width: 520px; }
  .ov-stat { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; padding: 20px 16px; }
  .ov-stat .big { font-size: 30px; font-weight: 800; letter-spacing: -0.03em; font-variant-numeric: tabular-nums; }
  .ov-stat .big.hl { color: var(--accent); }
  .ov-stat .lbl { font-size: 13px; color: var(--ink-3); font-weight: 600; margin-top: 2px; }
  .ov-links { display: flex; gap: 10px; flex-wrap: wrap; margin: 4px 0 26px; }
  .ov-hint { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--ink-2); background: var(--surface); border: 1px dashed var(--line); border-radius: 12px; padding: 14px 18px; max-width: 520px; }

  .state { padding: 60px 20px; text-align: center; color: var(--ink-3); }
  .state .spin { width: 26px; height: 26px; border: 3px solid var(--line); border-top-color: var(--accent); border-radius: 50%; margin: 0 auto 14px; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .state code { background: var(--surface-2); padding: 2px 8px; border-radius: 6px; font-size: 13px; }

  .scrim { display: none; }
  @media (max-width: 860px) {
    .shell { grid-template-columns: 1fr; }
    aside {
      position: fixed; top: var(--header-h); left: 0; z-index: 25; width: 320px; max-width: 86vw;
      transform: translateX(-102%); transition: transform 0.24s cubic-bezier(0.4,0,0.2,1);
      box-shadow: var(--shadow);
    }
    body.nav-open aside { transform: translateX(0); }
    body.nav-open .scrim { display: block; position: fixed; inset: var(--header-h) 0 0 0; z-index: 24; background: rgba(0,0,0,0.4); }
    .menu-btn { display: inline-flex; }
    .brand .sub { display: none; }
    .h-links .label { display: none; }
    .content { padding: 24px 18px 60px; }
  }
</style>
</head>
<body>
<header>
  <button class="icon-btn menu-btn" id="menuBtn" aria-label="메뉴 열기">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
  </button>
  <a class="brand" href="../"><span class="m"></span>Figma Dev Tools<span class="sub">컴포넌트 문서</span></a>
  <div class="h-links">
    <a href="../storybook/" title="Storybook 원본 열기"><span class="dot sb"></span><span class="label">Storybook 원본</span></a>
    <a href="https://github.com/Figam-Dev-Variable-Tools/Design-System-Hub-Tools" target="_blank" rel="noopener"><span class="label">GitHub</span>
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12c0 4.42 2.87 8.17 6.84 9.5.5.09.68-.22.68-.48v-1.7c-2.78.6-3.37-1.34-3.37-1.34-.45-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.89 1.53 2.34 1.09 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.94 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.65 0 0 .84-.27 2.75 1.02.8-.22 1.65-.33 2.5-.33.85 0 1.7.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.38.2 2.4.1 2.65.64.7 1.03 1.59 1.03 2.68 0 3.84-2.34 4.69-4.57 4.94.36.31.68.92.68 1.85v2.74c0 .27.18.58.69.48A10.01 10.01 0 0 0 22 12c0-5.52-4.48-10-10-10z"/></svg>
    </a>
    <button class="icon-btn" id="themeBtn" aria-label="테마 전환" title="라이트/다크 전환">
      <svg id="themeIcon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    </button>
  </div>
</header>

<div class="shell">
  <div class="scrim" id="scrim"></div>
  <aside>
    <div class="search">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.2-3.2"/></svg>
      <input id="search" type="search" placeholder="컴포넌트 검색…" autocomplete="off" />
    </div>
    <nav id="tree"></nav>
  </aside>
  <main>
    <div class="content" id="view">
      <div class="state"><div class="spin"></div>컴포넌트 목록을 불러오는 중…</div>
    </div>
  </main>
</div>

<script>
(function () {
  'use strict'
  // 문서 사이트는 <base>/docs/ 에 배포되고, Storybook 빌드는 <base>/storybook/ 에 있다.
  var SB_BASE = new URL('../storybook/', location.href).href
  var REPO = 'https://github.com/Figam-Dev-Variable-Tools/Design-System-Hub-Tools'

  var view = document.getElementById('view')
  var treeEl = document.getElementById('tree')
  var searchEl = document.getElementById('search')
  var comps = new Map() // title -> component
  var root = null

  // ── 유틸 ──
  function esc(s) { return String(s).replace(/[&<>"']/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c] }) }
  function naturalCompare(a, b) {
    var ax = [], bx = []
    String(a).replace(/(\d+)|(\D+)/g, function (_, n, s) { ax.push([n ? parseInt(n, 10) : Infinity, s || '']); return '' })
    String(b).replace(/(\d+)|(\D+)/g, function (_, n, s) { bx.push([n ? parseInt(n, 10) : Infinity, s || '']); return '' })
    while (ax.length && bx.length) {
      var an = ax.shift(), bn = bx.shift()
      var d = (an[0] - bn[0]) || an[1].localeCompare(bn[1], 'ko')
      if (d) return d
    }
    return ax.length - bx.length
  }

  // ── 데이터 로드 ──
  fetch(SB_BASE + 'index.json')
    .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json() })
    .catch(function () { return fetch(SB_BASE + 'stories.json').then(function (r) { return r.json() }) })
    .then(build)
    .catch(function (e) {
      view.innerHTML = '<div class="state"><h1 style="color:var(--ink)">컴포넌트를 불러오지 못했어요</h1>' +
        '<p>Storybook 인덱스(<code>storybook/index.json</code>)를 읽을 수 없습니다.<br>' + esc(e.message || e) + '</p>' +
        '<p style="margin-top:18px"><a class="pill primary" href="' + SB_BASE + '">Storybook 원본 열기 →</a></p></div>'
    })

  function build(index) {
    var entriesObj = index.entries || index.stories || {}
    Object.keys(entriesObj).forEach(function (k) {
      var e = entriesObj[k]
      if (!e || !e.title) return
      var c = comps.get(e.title)
      if (!c) { c = { title: e.title, segs: e.title.split('/'), name: e.title.split('/').pop(), stories: [], docsId: null }; comps.set(e.title, c) }
      if (e.type === 'docs') c.docsId = e.id
      else c.stories.push({ id: e.id, name: e.name || '기본' })
    })
    // 스토리도 문서도 없는 항목은 제외
    comps.forEach(function (c, k) { if (!c.stories.length && !c.docsId) comps.delete(k) })

    root = { seg: '', children: new Map(), comp: null }
    comps.forEach(function (c) {
      var node = root
      c.segs.forEach(function (seg, i) {
        if (!node.children.has(seg)) node.children.set(seg, { seg: seg, children: new Map(), comp: null })
        node = node.children.get(seg)
        if (i === c.segs.length - 1) node.comp = c
      })
    })

    renderTree('')
    window.addEventListener('hashchange', route)
    route()
  }

  // ── 사이드바 ──
  function renderTree(filter) {
    var f = (filter || '').trim().toLowerCase()
    var kids = [].concat.apply([], [Array.from(root.children.values())])
      .sort(function (a, b) { return naturalCompare(a.seg, b.seg) })
    var html = kids.map(function (n) { return renderNode(n, 0, f) }).filter(Boolean).join('')
    treeEl.innerHTML = html || '<div style="padding:16px;color:var(--ink-3);font-size:13px">검색 결과가 없어요.</div>'
    highlightActive()
  }

  function matches(node, f) {
    if (!f) return true
    if (node.comp && node.comp.title.toLowerCase().indexOf(f) >= 0) return true
    var found = false
    node.children.forEach(function (c) { if (matches(c, f)) found = true })
    return found
  }

  function renderNode(node, depth, f) {
    if (!matches(node, f)) return ''
    var isLeaf = node.comp && node.children.size === 0
    if (isLeaf) {
      var n = node.comp.stories.length
      var badge = n ? '<span class="cnt">' + n + '</span>' : '<span class="cnt guide">가이드</span>'
      return '<a class="leaf" data-title="' + esc(node.comp.title) + '" href="#' + encodeURIComponent(node.comp.title) + '">' +
        esc(node.seg) + badge + '</a>'
    }
    var kids = Array.from(node.children.values()).sort(function (a, b) { return naturalCompare(a.seg, b.seg) })
    var inner = kids.map(function (k) { return renderNode(k, depth + 1, f) }).filter(Boolean).join('')
    // 섹션/그룹이 자체 개요 문서(MDX)를 가지면(예: 타이포그래피·KR 컴포넌트) 상단에 '개요' 리프 추가
    var overview = ''
    if (node.comp) {
      overview = '<a class="leaf" data-title="' + esc(node.comp.title) + '" href="#' + encodeURIComponent(node.comp.title) + '">개요<span class="cnt guide">가이드</span></a>'
    }
    var cls = depth === 0 ? 'sec' : 'grp'
    return '<details class="' + cls + '" open><summary>' + esc(node.seg) + '</summary><div class="grp-body">' + overview + inner + '</div></details>'
  }

  searchEl.addEventListener('input', function () { renderTree(searchEl.value) })

  function highlightActive() {
    var active = decodeURIComponent(location.hash.slice(1))
    Array.prototype.forEach.call(treeEl.querySelectorAll('.leaf'), function (a) {
      a.classList.toggle('active', a.getAttribute('data-title') === active)
    })
  }

  // ── 라우팅 ──
  function route() {
    var title = decodeURIComponent(location.hash.slice(1))
    if (!title || !comps.has(title)) { renderOverview(); highlightActive(); return }
    renderComponent(comps.get(title))
    highlightActive()
    document.body.classList.remove('nav-open')
    var main = document.querySelector('main'); if (main) main.scrollTop = 0
    window.scrollTo(0, 0)
  }

  function renderOverview() {
    var total = comps.size
    var stories = 0
    comps.forEach(function (c) { stories += c.stories.length })
    view.innerHTML =
      '<div class="ov">' +
      '<span class="eyebrow">FIGMA&nbsp; ⇄ &nbsp;STORYBOOK</span>' +
      '<h1>디자인 시스템 컴포넌트</h1>' +
      '<p class="lead">Figma 플러그인과 Storybook이 <b>같은 토큰</b>으로 만든 컴포넌트를, 실제 렌더링 그대로 미리봅니다. 왼쪽에서 컴포넌트를 골라보세요.</p>' +
      '<div class="ov-stats">' +
      '<div class="ov-stat"><div class="big hl">' + total + '</div><div class="lbl">컴포넌트</div></div>' +
      '<div class="ov-stat"><div class="big">' + stories + '</div><div class="lbl">스토리(상태·베리언트)</div></div>' +
      '<div class="ov-stat"><div class="big">100%</div><div class="lbl">Figma 커버리지</div></div>' +
      '</div>' +
      '<div class="ov-links">' +
      '<a class="pill primary" href="#' + encodeURIComponent('0. 시작하기') + '">시작하기 가이드 →</a>' +
      '<a class="pill" href="#' + encodeURIComponent('1. 컬러') + '">컬러 시스템</a>' +
      '<a class="pill" href="#' + encodeURIComponent('2. 타이포그래피') + '">타이포그래피</a>' +
      '</div>' +
      '<div class="ov-hint">' +
      '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>' +
      '왼쪽 목록에서 컴포넌트를 선택하면 모든 상태·베리언트가 실제 컴포넌트로 나타나요.</div>' +
      '</div>'
  }

  function storyCardsHtml(c) {
    var h = ''
    c.stories.forEach(function (s) {
      var src = SB_BASE + 'iframe.html?viewMode=story&id=' + encodeURIComponent(s.id)
      h += '<div class="story"><div class="story-bar"><span class="name">' + esc(s.name) + '</span>' +
        '<a class="open" href="' + SB_BASE + '?path=/story/' + encodeURIComponent(s.id) + '" target="_blank" rel="noopener">전체 화면 ↗</a></div>' +
        '<div class="frame-wrap"><iframe loading="lazy" title="' + esc(c.name + ' — ' + s.name) + '" src="' + src + '"></iframe></div></div>'
    })
    return h
  }

  function autosizeIn(container) {
    if (!container) return
    Array.prototype.forEach.call(container.querySelectorAll('iframe'), function (f) {
      if (f.dataset.wired) return
      f.dataset.wired = '1'
      f.addEventListener('load', function () { sizeFrame(f) })
    })
  }

  // Storybook 문서(autodocs·MDX)를 흰 카드 안 iframe으로 마운트 → 실제 작성 문서 + 라이브 Controls 렌더
  function mountDocs(card, docsId, name) {
    var f = document.createElement('iframe')
    f.title = name + ' 문서'
    f.setAttribute('loading', 'lazy')
    f.addEventListener('load', function () { sizeFrame(f) })
    f.src = SB_BASE + 'iframe.html?viewMode=docs&id=' + encodeURIComponent(docsId)
    card.innerHTML = ''
    card.appendChild(f)
  }

  function renderComponent(c) {
    var path = c.segs.slice(0, -1).map(esc).join(' <b>›</b> ')
    var isGuide = !c.stories.length && c.docsId
    var docHref = c.docsId ? (SB_BASE + '?path=/docs/' + c.docsId) : (SB_BASE + '?path=/story/' + (c.stories[0] && c.stories[0].id))
    var header =
      '<div class="crumb">' + (path || (isGuide ? '가이드' : '컴포넌트')) + '</div>' +
      '<div class="c-head"><h1>' + esc(c.name) + '</h1><div class="spacer"></div>' +
      '<div class="c-actions"><a class="pill" href="' + docHref + '" target="_blank" rel="noopener">Storybook에서 열기 →</a></div></div>'

    // 가이드/문서 페이지(시작하기·컬러·타이포그래피·상태검증·접근성 등) — 작성된 문서를 그대로 렌더
    if (isGuide) {
      view.innerHTML = header + '<div class="doc-card" style="margin-top:8px"><div class="doc-loading">문서를 불러오는 중…</div></div>'
      mountDocs(view.querySelector('.doc-card'), c.docsId, c.name)
      return
    }

    // 컴포넌트 — 탭: 미리보기(자체 카드) / 사용법·변수 조합(autodocs = 설명+변수표+라이브 Controls)
    var hasDocs = !!c.docsId
    var tabs = '<div class="tabs"><button class="tab active" data-tab="preview"><span class="tdot"></span>미리보기</button>' +
      (hasDocs ? '<button class="tab" data-tab="docs"><span class="tdot"></span>사용법 · 변수 조합</button>' : '') + '</div>'
    var meta = '<div class="meta-row"><span class="chip"><b>' + c.stories.length + '</b> 스토리</span>' +
      (hasDocs ? '<span class="chip">변수 조합 · Controls</span>' : '') + '</div>'
    view.innerHTML = header + meta + tabs +
      '<div class="pane" data-pane="preview">' + storyCardsHtml(c) + '</div>' +
      (hasDocs ? '<div class="pane" data-pane="docs" hidden></div>' : '')
    autosizeIn(view.querySelector('[data-pane="preview"]'))

    if (!hasDocs) return
    var tabsEl = view.querySelector('.tabs')
    var docsLoaded = false
    tabsEl.addEventListener('click', function (e) {
      var btn = e.target.closest('.tab'); if (!btn) return
      var which = btn.getAttribute('data-tab')
      Array.prototype.forEach.call(tabsEl.querySelectorAll('.tab'), function (t) { t.classList.toggle('active', t === btn) })
      Array.prototype.forEach.call(view.querySelectorAll('.pane'), function (p) { p.hidden = p.getAttribute('data-pane') !== which })
      if (which === 'docs' && !docsLoaded) {
        docsLoaded = true
        var pane = view.querySelector('[data-pane="docs"]')
        pane.innerHTML =
          '<div class="guide-note"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 16v-4M12 8h.01"/></svg>' +
          '<span>아래 <b>Controls</b> 표에서 변수(variant·size·상태 등)를 바꾸면 컴포넌트가 <b>실시간</b>으로 조합 결과를 보여줘요. 표에 각 변수의 타입·기본값·설명이 정리돼 있습니다.</span></div>' +
          '<div class="doc-card"><div class="doc-loading">문서를 불러오는 중…</div></div>'
        mountDocs(pane.querySelector('.doc-card'), c.docsId, c.name)
      }
    })
  }

  function sizeFrame(f) {
    try {
      var doc = f.contentDocument
      if (!doc || !doc.body) { f.style.height = '220px'; return }
      var fit = function () {
        var h = Math.max(doc.body.scrollHeight, doc.documentElement.scrollHeight, 120)
        f.style.height = (h + 24) + 'px'
      }
      fit()
      // 웹폰트/차트 등 늦게 그려지는 요소 대응
      setTimeout(fit, 250)
      setTimeout(fit, 800)
      if (window.ResizeObserver) { var ro = new ResizeObserver(fit); ro.observe(doc.body) }
    } catch (e) { f.style.height = '240px' }
  }

  // ── 헤더 컨트롤 ──
  var menuBtn = document.getElementById('menuBtn')
  var scrim = document.getElementById('scrim')
  menuBtn.addEventListener('click', function () { document.body.classList.toggle('nav-open') })
  scrim.addEventListener('click', function () { document.body.classList.remove('nav-open') })
  treeEl.addEventListener('click', function (e) { if (e.target.closest('.leaf')) document.body.classList.remove('nav-open') })

  var root0 = document.documentElement
  var themeBtn = document.getElementById('themeBtn')
  var saved = null
  try { saved = localStorage.getItem('fdt-theme') } catch (e) {}
  if (saved) root0.setAttribute('data-theme', saved)
  themeBtn.addEventListener('click', function () {
    var isDark = root0.getAttribute('data-theme') === 'dark' ||
      (!root0.getAttribute('data-theme') && matchMedia('(prefers-color-scheme: dark)').matches)
    var next = isDark ? 'light' : 'dark'
    root0.setAttribute('data-theme', next)
    try { localStorage.setItem('fdt-theme', next) } catch (e) {}
  })
})()
</script>
</body>
</html>
